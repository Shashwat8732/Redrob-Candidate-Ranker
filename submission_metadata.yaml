# Approach summary

methodology_summary: |
  Four-stage pipeline for intelligent candidate ranking. Stage 1 applies
  hard filters — experience threshold (5yr min), industry check (product
  vs service companies), domain exclusion (CV/Speech/ASR), title rejection
  (non-ML roles), and honeypot detection (expert skill with <6 months usage,
  mathematically impossible tenure). Stage 2 computes semantic relevance
  using MiniLM (all-MiniLM-L6-v2) sentence embeddings with cosine similarity
  against the JD (weight 0.45). Stage 3 scores experience (weight 0.30):
  7+ years = 1.0, 5-7 years = 0.8. Stage 4 combines all 23 Redrob behavioral
  signals — login recency, response rate, interview completion, GitHub
  activity, verification status, notice period, salary fit, relocation
  willingness, and more — into a weighted behavioral score (weight 0.25).
  Final penalties applied for notice period >90 days and recruiter response
  rate <0.20. Runtime: ~3-9 seconds on CPU for 100K candidates.

